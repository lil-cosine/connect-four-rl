
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.screen { display: none; }
.screen.active { display: block; }
.btn { font-size: 14px; padding: 8px 20px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); cursor: pointer; }
.btn:hover { background: var(--color-background-secondary); }
.btn-primary { background: #185FA5; color: #B5D4F4; border-color: #185FA5; }
.btn-primary:hover { background: #0C447C; }
.btn-lg { font-size: 15px; padding: 10px 28px; }
.cell { width: 100%; aspect-ratio: 1; border-radius: 50%; background: var(--color-background-tertiary); border: 1.5px solid var(--color-border-tertiary); cursor: pointer; transition: background 0.1s; }
.cell.y { background: #EF9F27; border-color: #BA7517; cursor: default; }
.cell.r { background: #E24B4A; border-color: #A32D2D; cursor: default; }
.cell.hint { background: rgba(239,159,39,0.25); }
.col-btn { width: 100%; padding: 6px 0; font-size: 13px; background: transparent; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); color: var(--color-text-secondary); cursor: pointer; }
.col-btn:hover { background: var(--color-background-secondary); border-color: var(--color-border-secondary); }
.col-btn:disabled { opacity: 0.3; cursor: default; }
.tag { display: inline-block; font-size: 11px; padding: 2px 10px; border-radius: var(--border-radius-md); font-weight: 500; }
.tag-y { background: #FAEEDA; color: #633806; }
.tag-r { background: #FCEBEB; color: #791F1F; }
.tag-model { background: #E6F1FB; color: #0C447C; }
</style>

<div style="padding: 1rem 0;">
<h2 class="sr-only">Play Connect Four against the trained model</h2>

<div id="setupScreen" class="screen active">
  <div style="max-width: 360px; margin: 0 auto; text-align: center; padding: 2rem 0;">
    <p style="font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px;">Connect Four</p>
    <p style="font-size: 14px; color: var(--color-text-secondary); margin-bottom: 2rem;">vs trained model</p>

    <div style="background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; margin-bottom: 1.5rem;">
      <p style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 12px;">Model server</p>
      <input id="serverUrl" value="http://localhost:8766" style="width: 100%; margin-bottom: 12px; font-family: var(--font-mono); font-size: 13px;" />
      <div id="serverStatus" style="font-size: 12px; color: var(--color-text-tertiary);">Not connected</div>
    </div>

    <div style="background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; margin-bottom: 1.5rem;">
      <p style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 14px;">Who goes first?</p>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div id="optFirst" onclick="selectOrder(0)" style="padding: 14px; border-radius: var(--border-radius-md); border: 2px solid #185FA5; cursor: pointer; background: #E6F1FB;">
          <div style="width: 20px; height: 20px; border-radius: 50%; background: #EF9F27; margin: 0 auto 8px;"></div>
          <div style="font-size: 13px; font-weight: 500; color: #0C447C;">I go first</div>
        </div>
        <div id="optSecond" onclick="selectOrder(1)" style="padding: 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); cursor: pointer;">
          <div style="width: 20px; height: 20px; border-radius: 50%; background: #E24B4A; margin: 0 auto 8px;"></div>
          <div style="font-size: 13px; font-weight: 500; color: var(--color-text-secondary);">Model goes first</div>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-lg" onclick="startGame()" style="width:100%;">Start game</button>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;">
    <div style="display: flex; align-items: center; gap: 10px;">
      <div id="turnIndicator" style="width: 14px; height: 14px; border-radius: 50%; background: #EF9F27;"></div>
      <span id="turnText" style="font-size: 14px; color: var(--color-text-primary); font-weight: 500;">Your turn</span>
    </div>
    <div style="display: flex; align-items: center; gap: 8px;">
      <span id="youTag" class="tag tag-y">You</span>
      <span id="modelTag" class="tag tag-model">Model</span>
      <button class="btn" style="margin-left: 8px;" onclick="goSetup()">New game</button>
    </div>
  </div>

  <div id="colBtns" style="display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 4px; margin-bottom: 4px;"></div>

  <div style="background: #185FA5; padding: 8px; border-radius: var(--border-radius-md);">
    <div id="boardGrid" style="display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 4px;"></div>
  </div>

  <div id="statusBar" style="margin-top: 12px; min-height: 32px; display: flex; align-items: center; gap: 10px;">
    <span id="statusMsg" style="font-size: 14px; color: var(--color-text-secondary);"></span>
  </div>

  <div style="margin-top: 16px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 14px;">
    <div style="display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; text-align: center;">
      <div><div style="font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 2px;">Your wins</div><div id="statYou" style="font-size: 18px; font-weight: 500;">0</div></div>
      <div><div style="font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 2px;">Draws</div><div id="statDraw" style="font-size: 18px; font-weight: 500;">0</div></div>
      <div><div style="font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 2px;">Model wins</div><div id="statModel" style="font-size: 18px; font-weight: 500;">0</div></div>
    </div>
  </div>
</div>

</div>

<script>
let playerOrder = 0;
let board = [];
let currentPlayer = 0;
let gameOver = false;
let serverUrl = 'http://localhost:8766';
let stats = { you: 0, draw: 0, model: 0 };
let humanPlayer = 0;
let modelPlayer = 1;

function selectOrder(order) {
  playerOrder = order;
  const first = document.getElementById('optFirst');
  const second = document.getElementById('optSecond');
  if (order === 0) {
    first.style.border = '2px solid #185FA5';
    first.style.background = '#E6F1FB';
    first.querySelector('div:last-child').style.color = '#0C447C';
    second.style.border = '0.5px solid var(--color-border-tertiary)';
    second.style.background = 'transparent';
    second.querySelector('div:last-child').style.color = 'var(--color-text-secondary)';
  } else {
    second.style.border = '2px solid #185FA5';
    second.style.background = '#E6F1FB';
    second.querySelector('div:last-child').style.color = '#0C447C';
    first.style.border = '0.5px solid var(--color-border-tertiary)';
    first.style.background = 'transparent';
    first.querySelector('div:last-child').style.color = 'var(--color-text-secondary)';
  }
}

function initBoard() {
  board = Array.from({length: 6}, () => Array(7).fill(''));
}

function getValidCols() {
  return [0,1,2,3,4,5,6].filter(c => board[5][c] === '');
}

function dropPiece(col, player) {
  for (let r = 0; r < 6; r++) {
    if (board[r][col] === '') { board[r][col] = player === 0 ? 'y' : 'r'; return r; }
  }
  return -1;
}

function checkWin(player, col, row) {
  const piece = player === 0 ? 'y' : 'r';
  const dirs = [[1,0],[0,1],[1,1],[-1,1]];
  for (const [dx, dy] of dirs) {
    let count = 1;
    for (let i = 1; i < 4; i++) {
      const nc = col + dx*i, nr = row + dy*i;
      if (nc < 0 || nc > 6 || nr < 0 || nr > 5 || board[nr][nc] !== piece) break;
      count++;
    }
    for (let i = 1; i < 4; i++) {
      const nc = col - dx*i, nr = row - dy*i;
      if (nc < 0 || nc > 6 || nr < 0 || nr > 5 || board[nr][nc] !== piece) break;
      count++;
    }
    if (count >= 4) return true;
  }
  return false;
}

function isDraw() {
  return board[5].every(c => c !== '');
}

function renderBoard() {
  const grid = document.getElementById('boardGrid');
  grid.innerHTML = '';
  for (let r = 5; r >= 0; r--) {
    for (let c = 0; c < 7; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell' + (board[r][c] ? ' ' + board[r][c] : '');
      grid.appendChild(cell);
    }
  }
}

function renderColBtns(enabled) {
  const wrap = document.getElementById('colBtns');
  wrap.innerHTML = '';
  for (let c = 0; c < 7; c++) {
    const btn = document.createElement('button');
    btn.className = 'col-btn';
    btn.textContent = String(c + 1);
    const colFull = board[5][c] !== '';
    btn.disabled = !enabled || colFull || gameOver;
    btn.onclick = () => humanMove(c);
    wrap.appendChild(btn);
  }
}

function setTurnUI(isHuman) {
  const col = isHuman ? '#EF9F27' : '#E24B4A';
  document.getElementById('turnIndicator').style.background = col;
  document.getElementById('turnText').textContent = isHuman ? 'Your turn' : 'Model thinking...';
  renderColBtns(isHuman);
}

function setStatus(msg) {
  document.getElementById('statusMsg').textContent = msg;
}

async function humanMove(col) {
  if (gameOver || currentPlayer !== humanPlayer) return;
  const valid = getValidCols();
  if (!valid.includes(col)) return;

  const row = dropPiece(col, humanPlayer);
  renderBoard();
  renderColBtns(false);

  if (checkWin(humanPlayer, col, row)) {
    stats.you++;
    updateStats();
    setStatus('You win!');
    gameOver = true;
    renderColBtns(false);
    return;
  }
  if (isDraw()) {
    stats.draw++;
    updateStats();
    setStatus('Draw!');
    gameOver = true;
    return;
  }

  currentPlayer = modelPlayer;
  setTurnUI(false);
  setTimeout(doModelMove, 400);
}

async function doModelMove() {
  if (gameOver) return;
  let col = null;

  try {
    serverUrl = document.getElementById('serverUrl').value.trim();
    const state = getBoardState();
    const res = await fetch(serverUrl + '/move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ board: state, player: modelPlayer, valid_cols: getValidCols() })
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    col = data.col;
  } catch (e) {
    const valid = getValidCols();
    col = valid[Math.floor(Math.random() * valid.length)];
    setStatus('Server unreachable — model playing randomly');
  }

  const row = dropPiece(col, modelPlayer);
  renderBoard();

  if (checkWin(modelPlayer, col, row)) {
    stats.model++;
    updateStats();
    setStatus('Model wins!');
    gameOver = true;
    renderColBtns(false);
    return;
  }
  if (isDraw()) {
    stats.draw++;
    updateStats();
    setStatus('Draw!');
    gameOver = true;
    renderColBtns(false);
    return;
  }

  currentPlayer = humanPlayer;
  setTurnUI(true);
  setStatus('');
}

function getBoardState() {
  const state = [];
  for (let r = 0; r < 6; r++)
    for (let c = 0; c < 7; c++) {
      const cell = board[r][c];
      if (cell === '') state.push(0);
      else if ((cell === 'y' && modelPlayer === 1) || (cell === 'r' && modelPlayer === 0)) state.push(1);
      else state.push(-1);
    }
  return state;
}

function updateStats() {
  document.getElementById('statYou').textContent = stats.you;
  document.getElementById('statDraw').textContent = stats.draw;
  document.getElementById('statModel').textContent = stats.model;
}

function startGame() {
  humanPlayer = playerOrder;
  modelPlayer = 1 - playerOrder;
  initBoard();
  gameOver = false;
  currentPlayer = 0;

  const youTag = document.getElementById('youTag');
  const modelTag = document.getElementById('modelTag');
  if (humanPlayer === 0) {
    youTag.className = 'tag tag-y';
    youTag.textContent = 'You (yellow)';
    modelTag.className = 'tag tag-r';
    modelTag.textContent = 'Model (red)';
  } else {
    youTag.className = 'tag tag-r';
    youTag.textContent = 'You (red)';
    modelTag.className = 'tag tag-y';
    modelTag.textContent = 'Model (yellow)';
  }

  document.getElementById('setupScreen').classList.remove('active');
  document.getElementById('gameScreen').classList.add('active');

  renderBoard();
  setStatus('');

  if (currentPlayer === humanPlayer) {
    setTurnUI(true);
  } else {
    setTurnUI(false);
    setTimeout(doModelMove, 600);
  }
}

function goSetup() {
  document.getElementById('gameScreen').classList.remove('active');
  document.getElementById('setupScreen').classList.add('active');
}
</script>
